<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Office Portal</title>
<style>
  :root { color-scheme: light dark; --bg: #f5f5f4; --fg: #1a1a18; --muted: #6b6b67; --card: #fff; --border: #e5e5e3; --accent: #185fa5; }
  @media (prefers-color-scheme: dark) { :root { --bg: #18181b; --fg: #f4f4f2; --muted: #9b9b95; --card: #1f1f23; --border: #2e2e33; --accent: #5faee3; } }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); margin: 0; padding: 1.5rem; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  h1 { font-size: 1.25rem; margin: 0; }
  .crumbs { color: var(--muted); font-size: 0.875rem; margin-bottom: 1rem; }
  .crumbs a { color: var(--accent); text-decoration: none; }
  .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .btn { background: var(--card); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.875rem; cursor: pointer; font-size: 0.875rem; }
  .btn:hover { border-color: var(--accent); }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
  th, td { padding: 0.625rem 0.875rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
  th { font-weight: 600; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover { background: rgba(127,127,127,0.06); }
  .name { display: flex; align-items: center; gap: 0.5rem; }
  .name a { color: var(--fg); text-decoration: none; }
  .name a:hover { color: var(--accent); }
  .icon { display: inline-block; width: 1.25rem; text-align: center; }
  .row-actions { display: flex; gap: 0.375rem; justify-content: flex-end; }
  .empty { padding: 2rem; text-align: center; color: var(--muted); }
  .drop-zone.active { outline: 2px dashed var(--accent); outline-offset: -4px; }
  #file-input { display: none; }
</style>
</head>
<body>
<header>
  <h1>Office Portal</h1>
  <form method="post" action="/oidc/logout" style="margin:0">
    <button type="submit" class="btn">Sign out</button>
  </form>
</header>

<div class="crumbs" id="crumbs"></div>

<div class="toolbar">
  <button id="btn-upload" class="btn">Upload</button>
  <button id="btn-mkdir" class="btn">New folder</button>
  <button id="btn-refresh" class="btn">Refresh</button>
  <input type="file" id="file-input" multiple>
</div>

<div class="drop-zone" id="drop-zone">
  <table>
    <thead>
      <tr><th>Name</th><th>Size</th><th>Modified</th><th></th></tr>
    </thead>
    <tbody id="listing"></tbody>
  </table>
  <div class="empty" id="empty" hidden>This folder is empty. Upload a file or create a folder.</div>
</div>

<script>
(function() {
  const officeExt = new Set(['docx','xlsx','pptx','doc','xls','ppt']);
  let currentPath = '';

  const $ = (id) => document.getElementById(id);
  const fmt = (n) => n < 1024 ? `${n} B` : n < 1024*1024 ? `${(n/1024).toFixed(1)} KB` : `${(n/1024/1024).toFixed(2)} MB`;
  const ext = (name) => { const i = name.lastIndexOf('.'); return i > -1 ? name.slice(i+1).toLowerCase() : ''; };
  const isOffice = (name) => officeExt.has(ext(name));

  async function listAt(path) {
    const r = await fetch(`/api/files?path=${encodeURIComponent(path)}`, { credentials: 'same-origin' });
    if (r.status === 401) { location.assign('/oidc/login'); return; }
    if (!r.ok) { alert('list failed: ' + r.status); return; }
    const data = await r.json();
    currentPath = path;
    renderCrumbs(path);
    renderEntries(data.entries || []);
  }

  function renderCrumbs(path) {
    const wrap = $('crumbs');
    const parts = path ? path.split('/').filter(Boolean) : [];
    let html = `<a href="#" data-path="">📁 Home</a>`;
    let accum = '';
    for (const p of parts) {
      accum = accum ? `${accum}/${p}` : p;
      html += ` / <a href="#" data-path="${accum}">${escapeHtml(p)}</a>`;
    }
    wrap.innerHTML = html;
    wrap.querySelectorAll('a').forEach(a => a.addEventListener('click', e => {
      e.preventDefault();
      listAt(a.dataset.path);
    }));
  }

  function renderEntries(entries) {
    const tbody = $('listing');
    const empty = $('empty');
    entries.sort((a, b) => (b.is_collection - a.is_collection) || a.name.localeCompare(b.name));
    tbody.innerHTML = '';
    if (!entries.length) { empty.hidden = false; return; }
    empty.hidden = true;
    for (const e of entries) {
      const tr = document.createElement('tr');
      const nameTd = document.createElement('td');
      const action = e.is_collection ? 'nav' : (isOffice(e.name) ? 'edit' : 'download');
      const icon = e.is_collection ? '📁' : (isOffice(e.name) ? '📄' : '📎');
      nameTd.innerHTML = `<div class="name"><span class="icon">${icon}</span><a href="#" data-action="${action}" data-path="${escapeAttr(e.path)}">${escapeHtml(e.name)}</a></div>`;
      tr.appendChild(nameTd);
      const sizeTd = document.createElement('td');
      sizeTd.textContent = e.is_collection ? '' : fmt(e.size || 0);
      tr.appendChild(sizeTd);
      const mtimeTd = document.createElement('td');
      mtimeTd.textContent = e.last_modified || '';
      tr.appendChild(mtimeTd);
      const actionTd = document.createElement('td');
      actionTd.className = 'row-actions';
      actionTd.innerHTML = `<button class="btn" data-rename="${escapeAttr(e.path)}">Rename</button><button class="btn" data-delete="${escapeAttr(e.path)}">Delete</button>`;
      tr.appendChild(actionTd);
      tbody.appendChild(tr);
    }
    tbody.querySelectorAll('a[data-action]').forEach(a => a.addEventListener('click', e => {
      e.preventDefault();
      const path = a.dataset.path;
      if (a.dataset.action === 'nav') listAt(path);
      else if (a.dataset.action === 'edit') openEditor(path);
      else downloadFile(path);
    }));
    tbody.querySelectorAll('button[data-rename]').forEach(b => b.addEventListener('click', () => doRename(b.dataset.rename)));
    tbody.querySelectorAll('button[data-delete]').forEach(b => b.addEventListener('click', () => doDelete(b.dataset.delete)));
  }

  function openEditor(path) {
    location.assign(`/editor?path=${encodeURIComponent(path)}`);
  }

  async function downloadFile(path) {
    // Not implemented as a direct portal stream here; would need an auth'd portal route.
    alert('Direct download not yet implemented in v1; use a DAV mount.');
  }

  async function doRename(path) {
    const fromName = path.split('/').pop();
    const newName = prompt('New name:', fromName);
    if (!newName || newName === fromName) return;
    const parent = path.includes('/') ? path.slice(0, path.lastIndexOf('/')) : '';
    const to = parent ? `${parent}/${newName}` : newName;
    const r = await fetch('/api/rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ from: path, to }) });
    if (r.ok) listAt(currentPath); else alert('rename failed: ' + r.status);
  }

  async function doDelete(path) {
    if (!confirm(`Delete ${path}?`)) return;
    const r = await fetch('/api/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ path }) });
    if (r.ok) listAt(currentPath); else alert('delete failed: ' + r.status);
  }

  async function doMkdir() {
    const name = prompt('Folder name:');
    if (!name) return;
    const path = currentPath ? `${currentPath}/${name}` : name;
    const r = await fetch('/api/mkdir', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ path }) });
    if (r.ok) listAt(currentPath); else alert('mkdir failed: ' + r.status);
  }

  async function uploadFiles(fileList) {
    if (!fileList || !fileList.length) return;
    const fd = new FormData();
    for (const f of fileList) fd.append('file', f);
    const r = await fetch(`/api/upload?path=${encodeURIComponent(currentPath)}`, { method: 'POST', credentials: 'same-origin', body: fd });
    if (r.ok) listAt(currentPath); else alert('upload failed: ' + r.status);
  }

  function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  $('btn-upload').addEventListener('click', () => $('file-input').click());
  $('file-input').addEventListener('change', e => uploadFiles(e.target.files));
  $('btn-mkdir').addEventListener('click', doMkdir);
  $('btn-refresh').addEventListener('click', () => listAt(currentPath));

  const dz = $('drop-zone');
  ['dragenter', 'dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('active'); }));
  ['dragleave', 'drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('active'); }));
  dz.addEventListener('drop', e => uploadFiles(e.dataTransfer.files));

  listAt('');
})();
</script>
</body>
</html>
